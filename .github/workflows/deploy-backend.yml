name: Deploy Backend

on:
  push:
    branches: [main]
    paths: ['backend/**', 'iac/**']

# Required for GitHub's OIDC token, used to assume the AWS deploy role.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Config lives in the 'prod' GitHub Environment (as variables, not secrets).
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: SAM Deploy
        working-directory: iac
        # --use-container builds the Lambda package inside a Lambda-like image,
        # ensuring native wheels (e.g. PyJWT's cryptography) match the runtime.
        run: |
          sam build --use-container
          sam deploy --no-confirm-changeset
